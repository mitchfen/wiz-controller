---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wizcontroller-deployment
  labels:
    app: wizcontroller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wizcontroller
  template:
    metadata:
      labels:
        app: wizcontroller
    spec:
      containers:
        - name: wizcontroller
          image: ghcr.io/mitchfen/wiz-controller:latest
          resources: 
            limits:
              cpu: 1
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 250Mi
          env:
            # These environment variables override the IPs in appsettings.json
            - name: WizLights__Ips__0
              value: "192.168.1.24"
            - name: WizLights__Ips__1
              value: "192.168.1.25"
            - name: WizLights__Ips__2
              value: "192.168.1.26"
            - name: WizLights__Ips__3
              value: "192.168.1.27"
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: wizcontroller-service
spec:
  type: ClusterIP 
  selector:
    app: wizcontroller
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
